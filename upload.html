<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>New Note — JCABSS AI</title>
<link rel="stylesheet" href="styles.css">
<style>
  .back { color:var(--muted); font-weight:600; cursor:pointer; } .back:hover{ color:var(--emerald-d); }
  .upload-wrap { max-width:720px; margin:0 auto; padding:30px 22px 60px; }
  .upload-wrap h1 { font-size:2rem; margin-bottom:6px; }
</style>
</head>
<body>
<div class="topbar">
  <div class="brand"><span class="logo">📚</span> JCABSS <small>AI</small></div>
  <a class="back" href="dashboard.html">← Back to dashboard</a>
</div>
<main class="upload-wrap">
  <h1 class="rise">Create a new note</h1>
  <p class="muted rise">Paste or type your study material — the AI will summarise it and build a quiz.</p>
  <div id="flash" class="flash" style="margin-top:16px;"></div>
  <div class="card card--pad rise" style="animation-delay:.05s;margin-top:8px;">
    <div class="field"><label for="title">Note title</label><input class="input" id="title" type="text" placeholder="e.g. Biology — Photosynthesis"></div>
    <div class="field"><label for="subject">Subject <span class="muted" style="font-weight:400;">(optional)</span></label><input class="input" id="subject" type="text" placeholder="e.g. Biology"></div>
    <div class="field"><label for="content">Your notes</label><textarea class="input" id="content" placeholder="Paste your lesson notes, textbook passage, or anything you want to study…"></textarea></div>
    <button class="btn btn--primary btn--block" id="createBtn">✨ Create Note & Generate Summary</button>
  </div>
</main>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/config.js"></script>
<script src="js/session.js"></script>
<script src="js/ai.js"></script>
<script>
  let learner=null;
  (async()=>{ learner=await requireLearner(); })();
  const btn=$("#createBtn");
  btn.addEventListener("click", async ()=>{
    const title=$("#title").value.trim(), subject=$("#subject").value.trim()||null, content=$("#content").value.trim();
    const flashEl=$("#flash");
    if(!title){ flash(flashEl,"Please give your note a title."); return; }
    if(!content){ flash(flashEl,"Please add some notes to summarise."); return; }
    btn.disabled=true; const o=btn.textContent; btn.innerHTML='<span class="spinner"></span> Generating…';
    try{
      const ai = await aiSummarize(content);
      const note = await dataCreateNote(learner, { title, subject, content, summary: ai.summary, bulletPoints: ai.bulletPoints });
      go("note.html?id="+note.id);
    }catch(err){ flash(flashEl, err.message||"Could not create the note."); btn.disabled=false; btn.textContent=o; }
  });
</script>
</body>
</html>
