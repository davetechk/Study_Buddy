<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Note — JCABSS AI</title>
<link rel="stylesheet" href="styles.css">
<style>
  .back { color:var(--muted); font-weight:600; cursor:pointer; } .back:hover{ color:var(--emerald-d); }
  .note-wrap { max-width:900px; margin:0 auto; padding:26px 22px 60px; }
  .note-title { font-size:2.1rem; margin:10px 0 4px; }
  .grid2 { display:grid; grid-template-columns:1fr 1fr; gap:18px; margin-top:22px; }
  .panel { padding:24px; } .panel h3 { font-size:1.15rem; margin-bottom:12px; display:flex; align-items:center; gap:8px; }
  .panel .summary-text { line-height:1.7; color:var(--ink-2); }
  /* Key Takeaways: change "decimal" to lower-roman (i,ii,iii) or lower-alpha (a,b,c) */
  .bullets { list-style:none; counter-reset:kt; }
  .bullets li { padding:9px 0 9px 40px; position:relative; line-height:1.55; border-bottom:1px dashed var(--line); }
  .bullets li:last-child { border-bottom:none; }
  .bullets li::before { counter-increment:kt; content:counter(kt, decimal) "."; position:absolute; left:0; top:9px; width:28px; text-align:center; font-family:var(--display); font-weight:700; font-size:.9rem; color:#fff; background:var(--emerald); border-radius:7px; line-height:1.5; }
  .orig { margin-top:18px; }
  .orig .body { max-height:240px; overflow:auto; white-space:pre-wrap; color:var(--muted); background:var(--paper); border:1px solid var(--line); border-radius:12px; padding:14px; font-size:.92rem; line-height:1.6; }
  .actions { display:flex; gap:12px; margin-top:24px; flex-wrap:wrap; }
  .loading-state { text-align:center; padding:80px 20px; color:var(--muted); }
  @media (max-width:720px){ .grid2{grid-template-columns:1fr;} }
</style>
</head>
<body>
<div class="topbar">
  <div class="brand"><span class="logo">📚</span> JCABSS <small>AI</small></div>
  <a class="back" href="dashboard.html">← Dashboard</a>
</div>
<main class="note-wrap"><div id="content" class="loading-state">Loading note…</div></main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/config.js"></script>
<script src="js/session.js"></script>
<script src="js/ai.js"></script>
<script>
  let learner=null, note=null;
  const noteId=new URLSearchParams(location.search).get("id");
  function escapeHtml(s){ return (s||"").replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
  function parsePoints(raw){
    if(!raw) return []; let items=[]; const text=String(raw).trim();
    if(text.startsWith("[")){ try{ const arr=JSON.parse(text); if(Array.isArray(arr)) items=arr; }catch(e){} }
    if(!items.length) items=text.split("\n");
    return items.map(s=>String(s).replace(/^\s*([-*•]|\d+[.)]|[ivxlcIVXLC]+[.)]|[a-zA-Z][.)])\s*/,"").trim()).filter(Boolean);
  }
  function bulletsToList(raw){ return parsePoints(raw).map(i=>`<li>${escapeHtml(i)}</li>`).join(""); }

  async function load(){
    learner=await requireLearner(); if(!learner) return;
    if(!noteId){ $("#content").innerHTML="<p>Note not found.</p>"; return; }
    note = await dataGetNote(learner, noteId);
    if(!note){ $("#content").innerHTML="<p>Could not load this note.</p>"; return; }
    $("#content").innerHTML=`
      <div class="rise"><span class="pill">${note.subject?escapeHtml(note.subject):"Note"}</span>
        <h1 class="note-title">${escapeHtml(note.title)}</h1>
        <p class="muted">Created ${niceDate(note.created_at)}</p></div>
      <div class="grid2 rise" style="animation-delay:.05s">
        <div class="card panel"><h3>📋 AI Summary</h3><p class="summary-text">${escapeHtml(note.summary||"No summary yet.")}</p></div>
        <div class="card panel"><h3>🎯 Key Takeaways</h3><ol class="bullets">${bulletsToList(note.bullet_points)}</ol></div>
      </div>
      <div class="card panel orig rise" style="animation-delay:.1s"><h3>📄 Original Content</h3><div class="body">${escapeHtml(note.original_content||"")}</div></div>
      <div class="actions rise" style="animation-delay:.12s">
        <button class="btn btn--amber" id="quizBtn">🎯 Start Quiz Mode</button>
        <button class="btn btn--ghost" id="delBtn">🗑 Delete Note</button>
      </div>
      <div id="flash" class="flash" style="margin-top:14px;"></div>`;
    $("#quizBtn").addEventListener("click", startQuiz);
    $("#delBtn").addEventListener("click", del);
  }
  async function startQuiz(){
    const btn=$("#quizBtn"); btn.disabled=true; btn.innerHTML='<span class="spinner"></span> Generating questions…';
    try{
      const questions=await aiQuiz((note.original_content||"")+"\n"+(note.summary||""),5);
      const quiz=await dataCreateQuiz(learner, note.id, questions);
      go("quiz.html?id="+quiz.id);
    }catch(err){ flash($("#flash"), err.message||"Could not start the quiz."); btn.disabled=false; btn.textContent="🎯 Start Quiz Mode"; }
  }
  async function del(){
    if(!confirm("Delete this note? This cannot be undone.")) return;
    try{ await dataDeleteNote(learner, note.id); go("dashboard.html"); }
    catch(err){ flash($("#flash"), err.message); }
  }
  load();
</script>
</body>
</html>
