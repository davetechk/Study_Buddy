<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Note — JCABSS AI</title>
<link rel="stylesheet" href="styles.css">
<style>
  .back { color: var(--muted); font-weight:600; cursor:pointer; }
  .back:hover { color: var(--emerald-d); }
  .note-wrap { max-width: 900px; margin: 0 auto; padding: 26px 22px 60px; }
  .note-title { font-size: 2.1rem; margin: 10px 0 4px; }
  .grid2 { display:grid; grid-template-columns: 1fr 1fr; gap: 18px; margin-top: 22px; }
  .panel { padding: 24px; }
  .panel h3 { font-size: 1.15rem; margin-bottom: 12px; display:flex; align-items:center; gap:8px; }
  .panel .summary-text { line-height: 1.7; color: var(--ink-2); }
  .bullets { list-style: none; }
  .bullets li { padding: 8px 0 8px 28px; position: relative; line-height: 1.5; border-bottom: 1px dashed var(--line); }
  .bullets li:last-child { border-bottom: none; }
  .bullets li::before { content: "▸"; position: absolute; left: 6px; color: var(--emerald); font-weight: 700; }
  .orig { margin-top: 18px; }
  .orig .body { max-height: 240px; overflow:auto; white-space: pre-wrap; color: var(--muted);
    background: var(--paper); border:1px solid var(--line); border-radius: 12px; padding: 14px; font-size:.92rem; line-height:1.6; }
  .actions { display:flex; gap:12px; margin-top: 24px; flex-wrap: wrap; }
  .loading-state { text-align:center; padding: 80px 20px; color: var(--muted); }
  @media (max-width: 720px){ .grid2 { grid-template-columns: 1fr; } }
</style>
</head>
<body>
<div class="topbar">
  <div class="brand"><span class="logo">📚</span> JCABSS <small>AI</small></div>
  <a class="back" href="dashboard.html">← Dashboard</a>
</div>

<main class="note-wrap">
  <div id="content" class="loading-state">Loading note…</div>
</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/config.js"></script>
<script src="js/ai.js"></script>
<script>
  let user = null, note = null;
  const noteId = new URLSearchParams(location.search).get("id");

  function escapeHtml(s){ return (s||"").replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
  function bulletsToList(md){
    const items = (md||"").split("\n").map(l=>l.replace(/^[-*]\s*/,"").trim()).filter(Boolean);
    return items.map(i=>`<li>${escapeHtml(i)}</li>`).join("");
  }

  async function load() {
    user = await requireAuth(); if (!user) return;
    if (!noteId) { $("#content").innerHTML = "<p>Note not found.</p>"; return; }

    const { data, error } = await sb.from("notes").select("*").eq("id", noteId).single();
    if (error || !data) { $("#content").innerHTML = "<p>Could not load this note.</p>"; return; }
    note = data;

    $("#content").innerHTML = `
      <div class="rise">
        <span class="pill">${note.subject ? escapeHtml(note.subject) : "Note"}</span>
        <h1 class="note-title">${escapeHtml(note.title)}</h1>
        <p class="muted">Created ${niceDate(note.created_at)}</p>
      </div>

      <div class="grid2 rise" style="animation-delay:.05s">
        <div class="card panel">
          <h3>📋 AI Summary</h3>
          <p class="summary-text">${escapeHtml(note.summary || "No summary yet.")}</p>
        </div>
        <div class="card panel">
          <h3>🎯 Key Takeaways</h3>
          <ul class="bullets">${bulletsToList(note.bullet_points)}</ul>
        </div>
      </div>

      <div class="card panel orig rise" style="animation-delay:.1s">
        <h3>📄 Original Content</h3>
        <div class="body">${escapeHtml(note.original_content || "")}</div>
      </div>

      <div class="actions rise" style="animation-delay:.12s">
        <button class="btn btn--amber" id="quizBtn">🎯 Start Quiz Mode</button>
        <button class="btn btn--ghost" id="delBtn">🗑 Delete Note</button>
      </div>
      <div id="flash" class="flash" style="margin-top:14px;"></div>
    `;

    $("#quizBtn").addEventListener("click", startQuiz);
    $("#delBtn").addEventListener("click", del);
  }

  async function startQuiz() {
    const btn = $("#quizBtn");
    btn.disabled = true; btn.innerHTML = '<span class="spinner"></span> Generating questions…';
    try {
      const questions = await aiQuiz((note.original_content||"") + "\n" + (note.summary||""), 5);
      const { data, error } = await sb.from("quizzes").insert({
        learner_id: user.id, learner_type: "visitor",
        source_type: "note", note_id: note.id,
        questions, completed: false, score: 0, accuracy: 0
      }).select().single();
      if (error) throw error;
      go("quiz.html?id=" + data.id);
    } catch (err) {
      flash($("#flash"), err.message || "Could not start the quiz.");
      btn.disabled = false; btn.textContent = "🎯 Start Quiz Mode";
    }
  }

  async function del() {
    if (!confirm("Delete this note? This cannot be undone.")) return;
    const { error } = await sb.from("notes").delete().eq("id", note.id);
    if (error) { flash($("#flash"), error.message); return; }
    go("dashboard.html");
  }

  load();
</script>
</body>
</html>
